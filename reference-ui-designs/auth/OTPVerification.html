<script>
        // Handle OTP input movement
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.inputType === 'deleteContentBackward') return;
                
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Prevent non-numeric characters
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        // Simple Countdown Timer
        let timeLeft = 59;
        const timerDisplay = document.getElementById('timer');
        const resendBtn = document.getElementById('resend-btn');

        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerDisplay.textContent = "";
                resendBtn.classList.remove('text-on-surface-variant');
                resendBtn.classList.add('text-primary', 'font-semibold');
            } else {
                timerDisplay.textContent = `(${timeLeft}s)`;
                timeLeft--;
            }
        }, 1000);

        // Form Submission Micro-interaction
        document.getElementById('otp-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const code = Array.from(inputs).map(i => i.value).join('');
            if (code.length === 6) {
                const btn = e.target.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> <span>Verifying...</span>';
                
                setTimeout(() => {
                    // Logic for "Accept Offer" / "Confirm Shipment" success style if needed
                    btn.classList.remove('bg-primary');
                    btn.classList.add('bg-secondary');
                    btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>Access Granted</span>';
                }, 1500);
            }
        });
    </script>
